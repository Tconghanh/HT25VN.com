<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang quản trị trang web | Khang Gia Phúc</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --bg-dark: #0b0f19;
            --sidebar-bg: #161b2b;
            --card-bg: #1f2937;
            --text-main: #e2e8f0;
            --accent-glow: rgba(0, 242, 254, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Sidebar hiện đại */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .logo-box {
            padding: 40px 20px;
            text-align: center;
        }

        .logo-box img {
            max-width: 180px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .nav-menu {
            flex: 1;
            padding: 10px;
        }

        .nav-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            font-weight: 500;
        }

        .nav-item i {
            margin-right: 15px;
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Vùng nội dung chính */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        header {
            height: 60px;
            background: rgba(22, 27, 43, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
        }

        .content-area {
            flex: 1;
            padding: 15px;
            position: relative;
        }

        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #fff; /* Nền trắng cho nội dung nhúng để dễ đọc */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tab-panel.active {
            display: block;
            animation: slideIn 0.4s ease-out;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Panel Hỗ trợ đặc biệt */
        #ho-tro {
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .support-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
        }

        .support-card h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .info-row {
            margin: 15px 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-call {
            margin-top: 30px;
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-call:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-box">
            <img src="https://khanggiaphuc.com/data/logo.jpg" alt="Logo">
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item active" onclick="switchTab('them-sp', this)">
                <i class="fa-solid fa-plus-square"></i> Thêm sản phẩm
            </div>
            <div class="nav-item" onclick="switchTab('quan-ly-anh', this)">
                <i class="fa-solid fa-folder-open"></i> Quản lý hình ảnh
            </div>
            <div class="nav-item" onclick="switchTab('quan-ly-sp', this)">
                <i class="fa-solid fa-table"></i> Quản lý sản phẩm
            </div>
            <div class="nav-item" onclick="switchTab('ho-tro', this)">
                <i class="fa-solid fa-circle-info"></i> Hỗ trợ
            </div>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header>
            <div style="font-weight: 700; letter-spacing: 1px;">DASHBOARD QUẢN TRỊ</div>
            <div class="status-bar">
                <span class="dot"></span> Hệ thống đang trực tuyến
            </div>
        </header>

        <div class="content-area">
            <!-- Tab Thêm sản phẩm -->
            <div id="them-sp" class="tab-panel active">
                <!-- Chế độ embedded=true giúp form không bị nhảy trang -->
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe__utHtbrJH_eBnrVDDnJHZukCkTqUtMUsqhNKMDwlittKaQ/viewform?embedded=true"></iframe>
            </div>

            <!-- Tab Quản lý hình ảnh -->
            <div id="quan-ly-anh" class="tab-panel">
                <!-- Sử dụng link nhúng thư mục chuyên dụng của Drive -->
                <iframe src="https://drive.google.com/embeddedfolderview?id=1MlPGtR_vPmtJg2bJWJx56nnfWvhQ0S2uvco5HdtvA6pduojIMNRHt44lzKBtAWF_b20hhzdC#list"></iframe>
            </div>

            <!-- Tab Quản lý sản phẩm -->
            <div id="quan-ly-sp" class="tab-panel">
                <!-- Sử dụng chế độ htmlembed để chỉ hiện các ô tính -->
                <iframe src="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/htmlembed?gid=509656365&widget=false&chrome=false&headers=false"></iframe>
            </div>

            <!-- Tab Hỗ trợ -->
            <div id="ho-tro" class="tab-panel">
                <div class="support-card">
                    <i class="fa-solid fa-headset" style="font-size: 5rem; color: var(--primary-color); margin-bottom: 20px;"></i>
                    <h2>HỖ TRỢ KỸ THUẬT</h2>
                    <div class="info-row">
                        <i class="fa-solid fa-building"></i>
                        <span>Công ty TNHH Khang Gia Phúc</span>
                    </div>
                    <div class="info-row">
                        <i class="fa-solid fa-globe"></i>
                        <a href="https://www.khanggiaphuc.com" style="color: #4facfe; text-decoration: none;">www.khanggiaphuc.com</a>
                    </div>
                    <div class="info-row" style="font-size: 1.5rem; margin-top: 20px;">
                        <i class="fa-solid fa-phone-volume"></i>
                        <span style="color: #ff4757; font-weight: 800;">0844.900.099</span>
                    </div>
                    <a href="tel:0844900099" class="btn-call">GỌI HỖ TRỢ NGAY</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function switchTab(tabId, element) {
            // Ẩn tất cả các panel
            document.querySelectorAll('.tab-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            // Bỏ kích hoạt các menu
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Hiển thị panel được chọn và kích hoạt menu tương ứng
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
