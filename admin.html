<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang quản trị | Khang Gia Phúc</title>
    <!-- Thư viện biểu tượng và Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00b4d8;
            --zalo-blue: #0068ff; /* Màu xanh đặc trưng của Zalo */
            --bg-main: #0b0f17;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: var(--transition); z-index: 999; }
        .logo-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .logo-area img { max-width: 140px; height: auto; border-radius: 8px; }
        .menu-list { flex: 1; padding: 20px 12px; overflow-y: auto; }
        .menu-item { padding: 14px 16px; margin-bottom: 6px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition); color: var(--text-muted); font-weight: 500; font-size: 0.95rem; }
        .menu-item i { font-size: 1.1rem; width: 24px; text-align: center; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.03); color: var(--text-main); }
        .menu-item.active { background: rgba(0, 180, 216, 0.15); color: var(--primary); font-weight: 600; }

        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { height: 70px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); }
        .header-title { font-size: 1.15rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .header-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; }

        .content-frame { flex: 1; padding: 24px; background: var(--bg-main); overflow: hidden; }
        .tab-panel { display: none; width: 100%; height: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); background: #ffffff; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25); position: relative; }
        .tab-panel.active { display: block; animation: slideUp 0.4s ease; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Nút Drive */
        .panel-action-bar { position: absolute; top: 15px; right: 15px; z-index: 10; }
        .btn-action-drive { display: flex; align-items: center; gap: 8px; background: rgba(31, 41, 55, 0.9); backdrop-filter: blur(8px); color: #fff; padding: 11px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.1); transition: var(--transition); }
        .btn-action-drive:hover { background: var(--primary); transform: translateY(-2px); }

        /* Nút Zalo mới */
        .support-box { text-align: center; padding: 40px 30px; background: rgba(255, 255, 255, 0.02); border-radius: 24px; border: 1px solid var(--border-color); max-width: 500px; width: 100%; margin: 50px auto; }
        .support-icon-wrapper { width: 80px; height: 80px; background: rgba(0, 104, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; color: var(--zalo-blue); font-size: 2.5rem; }
        .btn-zalo { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: var(--zalo-blue); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; transition: var(--transition); box-shadow: 0 4px 15px rgba(0, 104, 255, 0.3); }
        .btn-zalo:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 104, 255, 0.5); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 992px) { .sidebar { position: absolute; left: -260px; height: 100%; } .sidebar.open { left: 0; } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-area"><img src="https://khanggiaphuc.com/data/logo.jpg" alt="Logo"></div>
        <div class="menu-list">
            <div class="menu-item active" onclick="changeTab('them-sp', this)"><i class="fas fa-plus-circle"></i> Thêm sản phẩm</div>
            <div class="menu-item" onclick="changeTab('quan-ly-anh', this)"><i class="fas fa-images"></i> Quản lý hình ảnh</div>
            <div class="menu-item" onclick="changeTab('quan-ly-sp', this)"><i class="fas fa-boxes-stacked"></i> Quản lý sản phẩm</div>
            <div class="menu-item" onclick="changeTab('ho-tro', this)"><i class="fas fa-headset"></i> Hỗ trợ kỹ thuật</div>
        </div>
    </aside>

    <main class="main-container">
        <header>
            <div class="header-title">HỆ THỐNG QUẢN TRỊ</div>
        </header>

        <div class="content-frame">
            <!-- Thêm sản phẩm -->
            <div id="them-sp" class="tab-panel active">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe__utHtbrJH_eBnrVDDnJHZukCkTqUtMUsqhNKMDwlittKaQ/viewform?embedded=true"></iframe>
            </div>

            <!-- Quản lý ảnh -->
            <div id="quan-ly-anh" class="tab-panel">
                <div class="panel-action-bar">
                    <a href="https://drive.google.com/drive/folders/1MlPGtR_vPmtJg2bJWJx56nnfWvhQ0S2uvco5HdtvA6pduojIMNRHt44lzKBtAWF_b20hhzdC" target="_blank" class="btn-action-drive">
                        <i class="fab fa-google-drive"></i> Mở quản lý Drive
                    </a>
                </div>
                <iframe src="https://drive.google.com/embeddedfolderview?id=1MlPGtR_vPmtJg2bJWJx56nnfWvhQ0S2uvco5HdtvA6pduojIMNRHt44lzKBtAWF_b20hhzdC#grid"></iframe>
            </div>

            <!-- Quản lý sản phẩm -->
            <div id="quan-ly-sp" class="tab-panel">
                <iframe src="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit?rm=minimal&gid=509656365#gid=509656365"></iframe>
            </div>

            <!-- Hỗ trợ -->
            <div id="ho-tro" class="tab-panel">
                <div class="support-box">
                    <div class="support-icon-wrapper"><i class="fas fa-comments"></i></div>
                    <h2>TRUNG TÂM HỖ TRỢ</h2>
                    <p style="margin-bottom: 25px; color: var(--text-muted);">Cần trợ giúp kỹ thuật? Hãy liên hệ qua Zalo với đội ngũ Khang Gia Phúc.</p>
                    
                    <a href="https://zalo.me/0844900099" target="_blank" class="btn-zalo">
                        <i class="fas fa-comment-dots"></i> LIÊN HỆ ZALO NGAY
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function changeTab(tabId, element) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
