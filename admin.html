<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang quản trị trang web | Khang Gia Phúc</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #f1f5f9;
            --accent-glow: rgba(0, 210, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Style */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .logo-container {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-container img {
            max-width: 150px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
        }

        .nav-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #94a3b8;
            border-left: 4px solid transparent;
            margin-bottom: 5px;
        }

        .nav-item i {
            margin-right: 15px;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary-color);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(58, 123, 213, 0.2) 0%, transparent 100%);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 70px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Content Area */
        .content-body {
            flex: 1;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.5s ease;
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff05;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white; /* Một số form/sheet cần nền trắng để dễ nhìn */
        }

        /* Tab Hỗ Trợ */
        .support-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .support-card h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .support-info p {
            margin: 15px 0;
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        .support-info a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .btn-contact {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: 0.3s;
        }

        .btn-contact:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-container">
            <img src="https://khanggiaphuc.com/data/logo.jpg" alt="Logo">
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showTab('them-sp', this)">
                <i class="fa-solid fa-circle-plus"></i>
                Thêm sản phẩm
            </div>
            <div class="nav-item" onclick="showTab('quan-ly-anh', this)">
                <i class="fa-solid fa-images"></i>
                Quản lý hình ảnh
            </div>
            <div class="nav-item" onclick="showTab('quan-ly-sp', this)">
                <i class="fa-solid fa-table-list"></i>
                Quản lý sản phẩm
            </div>
            <div class="nav-item" onclick="showTab('ho-tro', this)">
                <i class="fa-solid fa-headset"></i>
                Hỗ trợ
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <div class="header-title">TRANG QUẢN TRỊ HỆ THỐNG</div>
            <div class="user-profile">
                <span>Chào, <strong>Admin</strong></span>
                <i class="fa-solid fa-circle-user" style="font-size: 2rem; color: var(--primary-color);"></i>
            </div>
        </header>

        <div class="content-body">
            <!-- Tab Thêm sản phẩm -->
            <div id="them-sp" class="tab-content active">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe__utHtbrJH_eBnrVDDnJHZukCkTqUtMUsqhNKMDwlittKaQ/viewform?embedded=true">Đang tải...</iframe>
            </div>

            <!-- Tab Quản lý hình ảnh -->
            <div id="quan-ly-anh" class="tab-content">
                <!-- Google Drive Folder Iframe -->
                <iframe src="https://drive.google.com/drive/folders/1MlPGtR_vPmtJg2bJWJx56nnfWvhQ0S2uvco5HdtvA6pduojIMNRHt44lzKBtAWF_b20hhzdC">Đang tải...</iframe>
            </div>

            <!-- Tab Quản lý sản phẩm -->
            <div id="quan-ly-sp" class="tab-content">
                <iframe src="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit?gid=509656365#gid=509656365">Đang tải...</iframe>
            </div>

            <!-- Tab Hỗ trợ -->
            <div id="ho-tro" class="tab-content">
                <div class="support-card">
                    <i class="fa-solid fa-shield-halved" style="font-size: 4rem; color: var(--primary-color); margin-bottom: 20px;"></i>
                    <h2>Thông Tin Hỗ Trợ</h2>
                    <div class="support-info">
                        <p><strong>Đơn vị:</strong> Công ty TNHH Khang Gia Phúc</p>
                        <p><strong>Website:</strong> <a href="https://www.khanggiaphuc.com" target="_blank">www.khanggiaphuc.com</a></p>
                        <p><strong>Hotline kỹ thuật:</strong> <span style="color: #ff4757; font-weight: bold;">0844.900.099</span></p>
                    </div>
                    <a href="tel:0844900099" class="btn-contact">Liên hệ ngay</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabId, element) {
            // Loại bỏ class active ở các tab và menu
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Hiển thị tab được chọn
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
