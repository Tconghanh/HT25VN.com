<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang quản trị | Khang Gia Phúc</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0b1120;
            --sidebar-bg: #111827;
            --accent: #1e293b;
            --text-color: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .logo { padding: 40px 20px; text-align: center; }
        .logo img { max-width: 170px; filter: drop-shadow(0 0 10px rgba(0,242,254,0.3)); }
        
        .nav-item {
            padding: 15px 25px; margin: 5px 15px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            color: #94a3b8; transition: 0.3s; font-weight: 500;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; font-weight: 700; box-shadow: 0 5px 15px rgba(0,242,254,0.2); }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; }
        header { height: 70px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; background: rgba(17,24,39,0.8); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .content { flex: 1; padding: 20px; position: relative; }
        .tab-panel { display: none; width: 100%; height: 100%; border-radius: 15px; overflow: hidden; background: #fff; }
        .tab-panel.active { display: block; animation: fadeIn 0.4s ease; }

        /* Khung đặc biệt cho Quản lý hình ảnh */
        .drive-container { display: flex; flex-direction: column; background: #f8fafc; }
        .drive-toolbar {
            padding: 10px 20px; background: #1e293b; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-edit-drive {
            background: var(--primary); color: #000; padding: 8px 16px;
            border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-edit-drive:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,242,254,0.4); }

        iframe { width: 100%; height: 100%; border: none; }

        /* Hỗ trợ */
        #ho-tro { background: #111827; display: flex; align-items: center; justify-content: center; }
        .sup-card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 500px; }
        .btn-call { display: block; margin-top: 25px; padding: 15px; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; text-decoration: none; border-radius: 50px; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="https://khanggiaphuc.com/data/logo.jpg" alt="Logo"></div>
        <div class="nav-item active" onclick="showTab('them-sp', this)"><i class="fas fa-plus-circle"></i> Thêm sản phẩm</div>
        <div class="nav-item" onclick="showTab('quan-ly-anh', this)"><i class="fas fa-images"></i> Quản lý hình ảnh</div>
        <div class="nav-item" onclick="showTab('quan-ly-sp', this)"><i class="fas fa-list-alt"></i> Quản lý sản phẩm</div>
        <div class="nav-item" onclick="showTab('ho-tro', this)"><i class="fas fa-headset"></i> Hỗ trợ</div>
    </div>

    <div class="main">
        <header>
            <div style="font-weight: 600; color: var(--primary)">HỆ THỐNG QUẢN TRỊ KHANG GIA PHÚC</div>
            <div style="font-size: 0.9rem"><i class="fas fa-user-shield"></i> Chào Admin</div>
        </header>

        <div class="content">
            <!-- Thêm sản phẩm -->
            <div id="them-sp" class="tab-panel active">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe__utHtbrJH_eBnrVDDnJHZukCkTqUtMUsqhNKMDwlittKaQ/viewform?embedded=true"></iframe>
            </div>

            <!-- Quản lý hình ảnh -->
            <div id="quan-ly-anh" class="tab-panel drive-container">
                <div class="drive-toolbar">
                    <span><i class="fab fa-google-drive"></i> Thư mục hình ảnh hệ thống</span>
                    <a href="https://drive.google.com/drive/folders/1MlPGtR_vPmtJg2bJWJx56nnfWvhQ0S2uvco5HdtvA6pduojIMNRHt44lzKBtAWF_b20hhzdC" target="_blank" class="btn-edit-drive">
                        <i class="fas fa-external-link-alt"></i> MỞ TRÌNH QUẢN LÝ (THÊM/XÓA/SỬA)
                    </a>
                </div>
                <iframe src="https://drive.google.com/embeddedfolderview?id=1MlPGtR_vPmtJg2bJWJx56nnfWvhQ0S2uvco5HdtvA6pduojIMNRHt44lzKBtAWF_b20hhzdC#grid"></iframe>
            </div>

            <!-- Quản lý sản phẩm -->
            <div id="quan-ly-sp" class="tab-panel">
                <!-- Sử dụng link ẩn thanh công cụ và tab -->
                <iframe src="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/htmlembed?gid=509656365&widget=false&chrome=false&headers=false"></iframe>
            </div>

            <!-- Hỗ trợ -->
            <div id="ho-tro" class="tab-panel">
                <div class="sup-card">
                    <h2 style="color: var(--primary); margin-bottom: 15px;">HỖ TRỢ KỸ THUẬT</h2>
                    <p style="margin-bottom: 10px;"><strong>Công ty TNHH Khang Gia Phúc</strong></p>
                    <p>Website: <a href="https://khanggiaphuc.com" style="color: var(--secondary)">www.khanggiaphuc.com</a></p>
                    <h1 style="margin-top: 20px; color: #ff4757;">0844.900.099</h1>
                    <a href="tel:0844900099" class="btn-call">GỌI HOTLINE NGAY</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id, el) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
