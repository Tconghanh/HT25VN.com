<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGP Dashboard | Quản Trị & Tải Liệu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .tab-link {
            @apply px-5 py-3 rounded-2xl font-bold text-xs transition-all duration-300 flex items-center gap-2 whitespace-nowrap uppercase tracking-wider border border-transparent;
            color: #64748b;
        }
        .tab-link.active {
            @apply bg-blue-600 text-white shadow-lg shadow-blue-200;
        }

        .main-workspace {
            height: calc(100vh - 280px);
            min-height: 550px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        /* Nút Upload Nổi bật cho Mobile */
        .btn-upload {
            @apply fixed bottom-8 right-8 z-[100] bg-orange-500 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:bg-orange-600 hover:scale-110 transition-all duration-300 md:hidden;
            animation: pulse-orange 2s infinite;
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Floating Upload Button (Chỉ hiện trên điện thoại) -->
    <a href="https://drive.google.com/drive/folders/1dn5E5YMSmYHoq1IEJ9l84oVQeLaOJvFM" target="_blank" class="btn-upload" title="Tải file lên">
        <i class="fa-solid fa-cloud-arrow-up"></i>
    </a>

    <!-- Header -->
    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-[1536px] mx-auto px-4 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-4">
                    <img src="https://www.khanggiaphuc.com/data/logo.jpg" alt="Logo KGP" class="h-12 w-auto rounded-xl shadow-sm border border-white">
                    <div class="hidden sm:block">
                        <h1 class="text-lg font-extrabold text-slate-900 leading-none">KHANG GIA PHÚC</h1>
                        <p class="text-[10px] font-bold text-blue-600 mt-1 uppercase tracking-widest opacity-80">By tconghanh 0938608602</p>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <!-- Nút Tải Lên (Hiện trên PC) -->
                    <a href="https://drive.google.com/drive/folders/1dn5E5YMSmYHoq1IEJ9l84oVQeLaOJvFM" target="_blank" class="hidden md:flex items-center gap-2 bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-orange-600 transition shadow-lg shadow-orange-100">
                        <i class="fa-solid fa-plus"></i> Tải Lên File
                    </a>
                    
                    <button id="auth-btn" onclick="handleAuth()" class="flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 bg-white font-bold text-xs text-slate-600 hover:bg-slate-50 transition">
                        <i id="auth-icon" class="fa-brands fa-google"></i> <span id="auth-text">Google Login</span>
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="pb-3">
                <nav class="flex overflow-x-auto no-scrollbar gap-2">
                    <button onclick="switchTab(this, '0')" class="tab-link active"><i class="fa-solid fa-house"></i> Trang Chủ</button>
                    <button onclick="switchTab(this, '620957187')" class="tab-link"><i class="fa-solid fa-shield"></i> Bảo Hành</button>
                    <button onclick="switchTab(this, '895747298')" class="tab-link"><i class="fa-solid fa-box"></i> Sản Phẩm</button>
                    <button onclick="switchTab(this, '809858153')" class="tab-link"><i class="fa-solid fa-users"></i> Khách Hàng</button>
                    <button onclick="switchTab(this, 'drive')" class="tab-link"><i class="fa-solid fa-folder-open"></i> Kho Dữ Liệu</button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Workspace -->
    <main class="max-w-[1536px] mx-auto px-4 lg:px-8 py-6">
        <div class="main-workspace" data-aos="fade-up">
            <iframe id="main-frame" src="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit?rm=minimal&gid=0"></iframe>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-white mt-10 pt-16 pb-8">
        <div class="max-w-[1536px] mx-auto px-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-slate-800 pb-12">
                <div class="space-y-4">
                    <h3 class="text-xl font-black text-blue-500">KHANG GIA PHÚC</h3>
                    <p class="text-slate-400 text-sm italic">"Giải pháp công nghệ chuyên nghiệp cho mọi công trình."</p>
                </div>
                <div class="space-y-4">
                    <h4 class="text-xs font-bold uppercase text-slate-500 tracking-widest">Hỗ Trợ</h4>
                    <p class="text-sm">Hotline: <span class="text-blue-400 font-bold">0844.900.099</span></p>
                    <p class="text-sm">Web: <a href="https://www.khanggiaphuc.com" class="hover:text-blue-400">www.khanggiaphuc.com</a></p>
                </div>
                <div class="space-y-4">
                    <h4 class="text-xs font-bold uppercase text-slate-500 tracking-widest">Theo dõi</h4>
                    <div class="flex gap-4">
                        <a href="https://www.facebook.com/congnghetrongtamtay1" class="text-xl hover:text-blue-500"><i class="fa-brands fa-facebook"></i></a>
                        <a href="https://www.tiktok.com/@congnghetrongtamtay" class="text-xl hover:text-slate-400"><i class="fa-brands fa-tiktok"></i></a>
                    </div>
                </div>
            </div>
            <div class="mt-8 text-center text-[10px] text-slate-600 font-bold">
                © 2024 KHANG GIA PHÚC | POWERED BY TCONGHANH | HT25VN.COM
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        const frame = document.getElementById('main-frame');
        const authText = document.getElementById('auth-text');
        const authIcon = document.getElementById('auth-icon');
        const authBtn = document.getElementById('auth-btn');

        const DRIVE_URL = "https://drive.google.com/embeddedfolderview?id=1dn5E5YMSmYHoq1IEJ9l84oVQeLaOJvFM#grid";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit?rm=minimal";

        let isLoggedIn = localStorage.getItem('kgp_login') === 'true';

        function updateUI() {
            if(isLoggedIn) {
                authText.innerText = "Đăng xuất";
                authIcon.className = "fa-solid fa-right-from-bracket";
                authBtn.classList.add('text-red-500');
            } else {
                authText.innerText = "Google Login";
                authIcon.className = "fa-brands fa-google";
                authBtn.classList.remove('text-red-500');
            }
        }

        function handleAuth() {
            if(!isLoggedIn) {
                window.open('https://accounts.google.com/ServiceLogin', '_blank');
                localStorage.setItem('kgp_login', 'true');
                isLoggedIn = true;
                updateUI();
                location.reload();
            } else {
                if(confirm("Xác nhận đăng xuất và về trang ht25vn.com?")) {
                    localStorage.removeItem('kgp_login');
                    window.location.href = "https://ht25vn.com";
                }
            }
        }

        function switchTab(btn, target) {
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active', 'bg-blue-600', 'text-white'));
            btn.classList.add('active', 'bg-blue-600', 'text-white');
            
            frame.style.opacity = "0.3";
            frame.src = (target === 'drive') ? DRIVE_URL : `${SHEET_URL}&gid=${target}`;
            
            frame.onload = () => { frame.style.opacity = "1"; frame.style.transition = "0.5s"; };
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        updateUI();
    </script>
</body>
</html>
